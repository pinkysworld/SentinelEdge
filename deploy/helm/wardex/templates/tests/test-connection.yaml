apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "wardex.fullname" . }}-test-connection"
  labels:
    {{- include "wardex.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: wget
      image: busybox:1.36
      command: ["wget"]
      args:
        - "--no-verbose"
        - "--tries=3"
        - "--timeout=10"
        - "-O"
        - "/dev/null"
        - "http://{{ include "wardex.fullname" . }}:9077/api/health"
