apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: wardex
  labels:
    app.kubernetes.io/name: wardex
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: wardex
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from the ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 9077
    # Allow Prometheus scraping
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9077
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Inter-pod communication (cluster mode)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: wardex
      ports:
        - protocol: TCP
          port: 9078
