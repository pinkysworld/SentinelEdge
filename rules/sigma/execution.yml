title: Windows Script Host Execution
id: exec-007
status: stable
level: medium
description: Detects Windows Script Host executing suspicious scripts
author: Wardex Team
date: 2025/06/01
tags:
  - attack.execution
  - attack.t1059.005
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    process_name|endswith:
      - '\wscript.exe'
      - '\cscript.exe'
    CommandLine|contains:
      - '.vbs'
      - '.js'
      - '.wsf'
  condition: selection
falsepositives:
