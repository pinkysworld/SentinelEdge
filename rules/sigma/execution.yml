title: Curl/Wget Download and Execute
id: exec-008
status: stable
level: high
description: Detects download-and-execute patterns using curl or wget
author: Wardex Team
date: 2025/06/01
tags:
  - attack.execution
  - attack.t1059.004
logsource:
  category: process_creation
  product: linux
detection:
  selection:
    CommandLine|contains:
      - 'curl.*|.*sh'
      - 'wget.*-O-.*|.*sh'
      - 'curl.*|.*bash'
      - 'wget.*|.*bash'
  condition: selection
falsepositives:
  - Installation scripts
---
title: Process Injection via CreateRemoteThread
id: exec-009
status: stable
level: critical
description: Detects process injection using CreateRemoteThread API
author: Wardex Team
date: 2025/06/01
tags:
  - attack.execution
  - attack.t1055.001
logsource:
  category: process_access
  product: windows
detection:
  selection:
    CallTrace|contains: 'UNKNOWN'
    GrantedAccess: '0x1F0FFF'
  condition: selection
falsepositives:
  - Debugging tools
