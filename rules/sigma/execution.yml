title: Suspicious PowerShell Execution
id: exec-001
status: stable
level: high
description: Detects suspicious PowerShell execution with encoded commands
author: Wardex Team
date: 2025/06/01
tags:
  - attack.execution
  - attack.t1059.001
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      - '-enc'
      - '-EncodedCommand'
      - 'FromBase64String'
      - 'IEX'
      - 'Invoke-Expression'
  condition: selection
falsepositives:
  - Encoded deployment scripts
---
title: Living-off-the-Land Binary Execution
id: exec-002
status: stable
level: high
description: Detects abuse of LOLBins for code execution
author: Wardex Team
date: 2025/06/01
tags:
  - attack.execution
  - attack.t1218
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    process_name|endswith:
      - '\mshta.exe'
      - '\certutil.exe'
      - '\regsvr32.exe'
      - '\rundll32.exe'
      - '\msiexec.exe'
      - '\cmstp.exe'
      - '\msxsl.exe'
  condition: selection
falsepositives:
  - Legitimate use of system tools
---
title: Python Reverse Shell
id: exec-003
status: stable
level: critical
description: Detects Python-based reverse shell execution
author: Wardex Team
date: 2025/06/01
tags:
  - attack.execution
  - attack.t1059.006
logsource:
  category: process_creation
  product: linux
detection:
  selection:
    CommandLine|contains:
      - 'python -c "import socket'
      - 'python3 -c "import socket'
      - 'python -c ''import socket'
      - 'pty.spawn'
  condition: selection
falsepositives:
  - Development environments
---
title: Bash Reverse Shell
id: exec-004
status: stable
level: critical
description: Detects bash-based reverse shell execution
author: Wardex Team
date: 2025/06/01
tags:
  - attack.execution
  - attack.t1059.004
logsource:
  category: process_creation
  product: linux
detection:
  selection:
    CommandLine|contains:
      - 'bash -i >& /dev/tcp'
      - '/bin/sh -i'
      - 'mkfifo /tmp/f'
      - 'nc -e /bin'
  condition: selection
falsepositives:
  - None expected
---
title: MSHTA JavaScript Execution
id: exec-005
status: stable
level: high
description: Detects MSHTA executing inline JavaScript for code execution
author: Wardex Team
date: 2025/06/01
tags:
  - attack.execution
  - attack.t1218.005
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    process_name|endswith: '\mshta.exe'
    CommandLine|contains:
      - 'javascript:'
      - 'vbscript:'
  condition: selection
falsepositives:
  - Legacy HTA applications
