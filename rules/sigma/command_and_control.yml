title: Sliver C2 Framework Detection
id: c2-007
status: stable
level: critical
description: Detects Sliver C2 framework communication indicators
author: Wardex Team
date: 2025/06/01
tags:
  - attack.command_and_control
  - attack.t1071
logsource:
  category: network
  product: wardex
detection:
  selection:
    http_user_agent|contains:
      - 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit'
    http_method: POST
    http_content_type: 'application/octet-stream'
  condition: selection
falsepositives:
  - Binary file uploads
