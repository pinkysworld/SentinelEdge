title: C2 via Cloud Storage Services
id: c2-008
status: stable
level: medium
description: Detects C2 communication via cloud storage (Dropbox, Google Drive, OneDrive)
author: Wardex Team
date: 2025/06/01
tags:
  - attack.command_and_control
  - attack.t1102
logsource:
  category: proxy
  product: wardex
detection:
  selection:
    url|contains:
      - 'api.dropboxapi.com'
      - 'www.googleapis.com/upload/drive'
      - 'graph.microsoft.com/v1.0/me/drive'
    http_method: PUT
  condition: selection | count() > 10
  timeframe: 1h
falsepositives:
  - Legitimate cloud sync
---
title: Encrypted Channel via Non-Standard Port
id: c2-009
status: stable
level: medium
description: Detects TLS/SSL traffic on non-standard ports indicating C2
author: Wardex Team
date: 2025/06/01
tags:
  - attack.command_and_control
  - attack.t1573.002
logsource:
  category: network
  product: wardex
detection:
  selection:
    protocol: tls
    dst_port|not:
      - '443'
      - '8443'
      - '993'
      - '995'
      - '465'
  condition: selection
falsepositives:
  - VPN connections
