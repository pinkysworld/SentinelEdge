title: C2 Communication via DNS Tunneling
id: c2-001
status: stable
level: high
description: Detects DNS tunneling used for command and control
author: Wardex Team
date: 2025/06/01
tags:
  - attack.command_and_control
  - attack.t1071.004
logsource:
  category: dns
  product: wardex
detection:
  selection:
    dns_query_length|gt: 50
    dns_query_type: TXT
  condition: selection | count() > 20
  timeframe: 5m
falsepositives:
  - DKIM/SPF DNS records
---
title: Cobalt Strike Default Profile
id: c2-002
status: stable
level: critical
description: Detects default Cobalt Strike C2 communication patterns
author: Wardex Team
date: 2025/06/01
tags:
  - attack.command_and_control
  - attack.t1071.001
logsource:
  category: network
  product: wardex
detection:
  selection:
    dst_port:
      - '50050'
      - '443'
    http_uri|contains:
      - '/pixel'
      - '/submit.php'
      - '/ca'
      - '/__utm.gif'
  condition: selection
falsepositives:
  - Web analytics
---
title: C2 via HTTPS Beaconing
id: c2-003
status: stable
level: high
description: Detects periodic HTTPS beaconing indicative of C2 communication
author: Wardex Team
date: 2025/06/01
tags:
  - attack.command_and_control
  - attack.t1071.001
logsource:
  category: network
  product: wardex
detection:
  selection:
    event_type: connection
    dst_port: '443'
  condition: selection | count() by dst_ip | near(interval=60s, tolerance=5s)
  timeframe: 30m
falsepositives:
  - Heartbeat/keepalive connections
