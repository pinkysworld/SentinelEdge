title: Fast Flux DNS Detection
id: c2-010
status: stable
level: high
description: Detects fast flux DNS patterns used for C2 infrastructure resilience
author: Wardex Team
date: 2025/06/01
tags:
  - attack.command_and_control
  - attack.t1568.001
logsource:
  category: dns
  product: wardex
detection:
  selection:
    dns_answer_count|gt: 5
    dns_ttl|lt: 300
  condition: selection
falsepositives:
