title: Ransomware File Extension Modification
id: impact-001
status: stable
level: critical
description: Detects mass file extension changes indicating ransomware encryption
author: Wardex Team
date: 2025/06/01
tags:
  - attack.impact
  - attack.t1486
logsource:
  category: file_event
  product: wardex
detection:
  selection:
    event_type: file_rename
    TargetFilename|endswith:
      - '.encrypted'
      - '.locked'
      - '.crypt'
      - '.enc'
      - '.lockbit'
      - '.blackcat'
  condition: selection | count() > 50
  timeframe: 1m
falsepositives:
  - Legitimate encryption tools
---
title: Volume Shadow Copy Deletion
id: impact-002
status: stable
level: critical
description: Detects deletion of volume shadow copies prior to ransomware execution
author: Wardex Team
date: 2025/06/01
tags:
  - attack.impact
  - attack.t1490
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      - 'vssadmin delete shadows'
      - 'wmic shadowcopy delete'
      - 'bcdedit /set {default} recoveryenabled no'
  condition: selection
falsepositives:
  - Disk cleanup operations
---
title: Disk Wiper Activity
id: impact-003
status: stable
level: critical
description: Detects disk wiping tools and techniques
author: Wardex Team
date: 2025/06/01
tags:
  - attack.impact
  - attack.t1561.001
logsource:
  category: process_creation
  product: linux
detection:
  selection:
    CommandLine|contains:
      - 'dd if=/dev/zero'
      - 'dd if=/dev/urandom'
      - 'shred -f'
      - 'rm -rf /'
  condition: selection
falsepositives:
  - Secure disk sanitization
---
title: Service Stop for Impact
id: impact-004
status: stable
level: high
description: Detects stopping of critical services before destructive actions
author: Wardex Team
date: 2025/06/01
tags:
  - attack.impact
  - attack.t1489
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      - 'net stop'
      - 'sc stop'
      - 'taskkill /f /im'
    CommandLine|contains:
      - 'sql'
      - 'exchange'
      - 'backup'
      - 'vss'
  condition: selection
falsepositives:
  - Maintenance windows
