title: Exfiltration - Covert Channel via ICMP
id: wdx-exfil-010
status: stable
level: high
description: Detects ICMP-based data exfiltration via oversized packets
tags:
  - attack.exfiltration
  - attack.t1048.003
logsource:
  category: network
  product: wardex
detection:
  selection:
    protocol: icmp
    packet_size|gt: 200
  condition: selection | count() > 100
  timeframe: 5m
falsepositives:
  - Network monitoring tools
