title: Exfiltration - Data Transfer Over Alternative Protocol
id: wdx-exfil-001
status: stable
level: high
description: >
  Detects potential data exfiltration through alternative protocols
  such as DNS tunneling, ICMP exfil, or use of cloud storage CLIs.
references:
  - https://attack.mitre.org/techniques/T1048/
  - https://attack.mitre.org/techniques/T1567/
tags:
  - attack.exfiltration
  - attack.t1048
  - attack.t1567
logsource:
  category: process_creation
detection:
  selection_dns_exfil:
    CommandLine|contains:
      - 'nslookup -type=txt'
      - 'dig +short TXT'
      - 'dnscat'
      - 'iodine'
      - 'dns2tcp'
  selection_cloud_exfil:
    Image|endswith:
      - '\rclone.exe'
      - '/rclone'
      - '\megacmd.exe'
      - '/mega-cmd'
    CommandLine|contains:
      - 'copy'
      - 'sync'
      - 'upload'
      - 'put'
  selection_http_exfil:
    CommandLine|contains:
      - 'curl -X POST'
      - 'curl --upload-file'
      - 'wget --post-file'
      - 'Invoke-WebRequest -Method Post'
      - 'Invoke-RestMethod -Method Post'
  condition: selection_dns_exfil or selection_cloud_exfil or selection_http_exfil
falsepositives:
  - Legitimate cloud backup operations
  - DNS diagnostic commands
  - CI/CD artifact uploads
mitre:
  tactics:
    - exfiltration
  techniques:
    - T1048.001  # Exfiltration Over Symmetric Encrypted Non-C2 Protocol
    - T1048.003  # Exfiltration Over Unencrypted Non-C2 Protocol
    - T1567.002  # Exfiltration to Cloud Storage

