title: Exfiltration - Large Outbound Data Transfer
id: wdx-exfil-002
status: stable
level: medium
description: >
  Detects unusually large outbound data transfers that may indicate
  bulk data exfiltration. Requires network telemetry.
tags:
  - attack.exfiltration
  - attack.t1048
logsource:
  category: network_connection
detection:
  selection:
    Direction: outbound
    BytesSent|gte: 104857600  # 100MB threshold
  filter_known_services:
    DestinationHostname|endswith:
      - '.windowsupdate.com'
      - '.microsoft.com'
      - '.apple.com'
      - '.googleapis.com'
  condition: selection and not filter_known_services
falsepositives:
  - Legitimate large file uploads
  - Video conferencing
  - Cloud backup services
mitre:
  techniques:
    - T1048  # Exfiltration Over Alternative Protocol
    - T1029  # Scheduled Transfer

---

title: Exfiltration - Archive Creation Before Transfer
id: wdx-exfil-003
status: stable
level: medium
description: >
  Detects creation of compressed archives in temporary or user
  directories, commonly done before data exfiltration.
tags:
  - attack.collection
  - attack.t1560.001
  - attack.exfiltration
logsource:
  category: process_creation
detection:
  selection_archive:
    CommandLine|contains:
      - '7z a '
      - 'zip -r'
      - 'tar czf'
      - 'tar -czf'
      - 'rar a '
      - 'Compress-Archive'
  selection_sensitive_dirs:
    CommandLine|contains:
      - '\Users\'
      - '\Documents\'
      - '/home/'
      - '/etc/'
      - '\Desktop\'
      - '\Downloads\'
  condition: selection_archive and selection_sensitive_dirs
falsepositives:
  - Authorized backup procedures
  - Developers archiving project files
mitre:
  techniques:
    - T1560.001  # Archive via Utility
    - T1074.001  # Local Data Staging

---

title: Exfiltration - Large File Upload to Cloud Storage
id: wdx-exfil-004
status: stable
level: high
description: Detects large file uploads to cloud storage services
tags:
  - attack.exfiltration
  - attack.t1567.002
logsource:
  category: proxy
  product: wardex
detection:
  selection:
    url|contains:
      - 'upload.googleapis.com'
      - 'api.dropboxapi.com'
      - 'blob.core.windows.net'
    bytes_out|gt: 50000000
  condition: selection
falsepositives:
  - Approved cloud backups

