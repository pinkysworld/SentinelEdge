title: Supply Chain - Dependency Confusion Attack
id: wdx-supply-010
status: stable
level: critical
description: Detects packages pulled from public registries that shadow internal packages
tags:
  - attack.initial_access
  - attack.t1195.002
  - wardex.supply_chain
logsource:
  category: package_manager
  product: wardex
detection:
  selection:
    event_type: package_install
    source: public_registry
    name_matches_internal: 'true'
  condition: selection
falsepositives:
  - Open-sourced internal packages
