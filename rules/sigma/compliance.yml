title: Compliance - Privileged Account without Review
id: compliance-006
status: stable
level: medium
description: Detects privileged accounts that haven't been reviewed within policy period
author: Wardex Team
date: 2025/06/01
tags:
  - compliance.soc2
  - compliance.iso27001
  - wardex.compliance
logsource:
  category: identity
  product: wardex
detection:
  selection:
    event_type: access_review
    role: admin
    last_review_days|gt: 90
  condition: selection
falsepositives:
  - New accounts pending first review
---
title: Compliance - Audit Log Tampering
id: compliance-007
status: stable
level: critical
description: Detects attempts to modify, delete, or disable audit logging
author: Wardex Team
date: 2025/06/01
tags:
  - compliance.soc2
  - compliance.pci
  - compliance.hipaa
  - wardex.compliance
logsource:
  category: security
  product: wardex
detection:
  selection:
    event_type|contains:
      - 'audit_disable'
      - 'log_delete'
      - 'log_modify'
  condition: selection
falsepositives:
  - Log rotation operations
---
title: Compliance - PII Access Logging
id: compliance-008
status: stable
level: medium
description: Detects access to tables or fields containing personally identifiable information
author: Wardex Team
date: 2025/06/01
tags:
  - compliance.gdpr
  - compliance.ccpa
  - wardex.compliance
logsource:
  category: database
  product: wardex
detection:
  selection:
    table_name|contains:
      - 'customer'
      - 'patient'
      - 'employee'
    column_name|contains:
      - 'ssn'
      - 'email'
      - 'phone'
      - 'address'
  condition: selection
falsepositives:
  - Authorized data processing
---
