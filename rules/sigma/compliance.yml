title: Compliance - Unauthorized Admin Access Attempt
id: compliance-001
status: stable
level: high
description: Detects unauthorized attempts to access administrative functions
author: Wardex Team
date: 2025/06/01
tags:
  - compliance.soc2
  - compliance.pci
  - wardex.compliance
logsource:
  category: authentication
  product: wardex
detection:
  selection:
    event_type: auth_failure
    target_resource: admin_panel
  condition: selection | count() > 3
  timeframe: 5m
falsepositives:
  - Legitimate admin lockouts
---
title: Compliance - Data Export without Approval
id: compliance-002
status: stable
level: high
description: Detects bulk data exports without prior approval workflow completion
author: Wardex Team
date: 2025/06/01
tags:
  - compliance.gdpr
  - compliance.hipaa
  - wardex.compliance
logsource:
  category: application
  product: wardex
detection:
  selection:
    event_type: data_export
    approval_status: 'none'
  condition: selection
falsepositives:
  - Emergency data requests
