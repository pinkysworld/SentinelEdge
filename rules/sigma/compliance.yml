title: Compliance - Unpatched System Detection
id: compliance-013
status: stable
level: medium
description: Detects systems missing critical security patches beyond SLA
author: Wardex Team
date: 2025/06/01
tags:
  - compliance.nist
  - compliance.soc2
  - wardex.compliance
logsource:
  category: vulnerability
  product: wardex
detection:
  selection:
    event_type: patch_status
    severity: critical
    days_overdue|gt: 14
  condition: selection
falsepositives:
  - Systems with approved exceptions
