title: Credential Access via LSASS Memory Dump
id: cred-001
status: stable
level: critical
description: Detects processes accessing LSASS memory for credential dumping
author: Wardex Team
date: 2025/06/01
tags:
  - attack.credential_access
  - attack.t1003.001
  - mitre.lsass
logsource:
  category: process_access
  product: windows
detection:
  selection:
    TargetImage|endswith: '\lsass.exe'
    GrantedAccess|contains:
      - '0x1010'
      - '0x1410'
      - '0x1438'
  condition: selection
falsepositives:
  - Legitimate security tools
---
title: DCSync Attack Detection
id: cred-002
status: stable
level: critical
description: Detects DCSync replication requests indicating credential theft
author: Wardex Team
date: 2025/06/01
tags:
  - attack.credential_access
  - attack.t1003.006
  - mitre.dcsync
logsource:
  category: security
  product: windows
  service: security
detection:
  selection:
    EventID: 4662
    Properties|contains:
      - '1131f6aa-9c07-11d1-f79f-00c04fc2dcd2'
      - '1131f6ad-9c07-11d1-f79f-00c04fc2dcd2'
  condition: selection
falsepositives:
  - Domain controller replication
