title: Chrome Browser Password Extraction
id: cred-008
status: stable
level: high
description: Detects tools accessing Chrome stored passwords
author: Wardex Team
date: 2025/06/01
tags:
  - attack.credential_access
  - attack.t1555.003
logsource:
  category: file_access
  product: windows
detection:
  selection:
    TargetFilename|contains: 'Login Data'
    SourceImage|endswith:
      - '\python.exe'
      - '\python3.exe'
      - '\powershell.exe'
  condition: selection
falsepositives:
  - Browser sync tools
