title: SSH Key Theft Attempt
id: cred-009
status: stable
level: high
description: Detects unauthorized access to SSH private keys
author: Wardex Team
date: 2025/06/01
tags:
  - attack.credential_access
  - attack.t1552.004
logsource:
  category: file_access
  product: linux
detection:
  selection:
    TargetFilename|contains: '.ssh/id_'
    process_name|endswith:
      - 'curl'
      - 'wget'
      - 'nc'
      - 'scp'
  condition: selection
falsepositives:
  - SSH key backup operations
