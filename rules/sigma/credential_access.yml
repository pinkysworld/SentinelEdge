title: NTLM Hash Extraction via Registry
id: cred-005
status: stable
level: critical
description: Detects SAM/SECURITY/SYSTEM registry hive access for offline cracking
author: Wardex Team
date: 2025/06/01
tags:
  - attack.credential_access
  - attack.t1003.002
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      - 'reg save HKLM\SAM'
      - 'reg save HKLM\SECURITY'
      - 'reg save HKLM\SYSTEM'
  condition: selection
falsepositives:
  - Backup scripts
---
title: Password Spray via Multiple Failed Logins
id: cred-006
status: stable
level: high
description: Detects password spray attacks with many accounts failing from same source
author: Wardex Team
date: 2025/06/01
tags:
  - attack.credential_access
  - attack.t1110.003
logsource:
  category: authentication
  product: wardex
detection:
  selection:
    event_type: auth_failure
  condition: selection | count(TargetUserName) by SourceIP > 20
  timeframe: 10m
falsepositives:
  - Shared workstations
---
title: Credential Vault Access
id: cred-007
status: stable
level: medium
description: Detects access to Windows Credential Manager vaults
author: Wardex Team
date: 2025/06/01
tags:
  - attack.credential_access
  - attack.t1555.004
logsource:
  category: process_creation
  product: windows
detection:
