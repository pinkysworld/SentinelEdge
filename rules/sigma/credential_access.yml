title: Kerberoasting via Service Ticket Request
id: cred-003
status: stable
level: high
description: Detects Kerberos service ticket requests targeting service accounts
author: Wardex Team
date: 2025/06/01
tags:
  - attack.credential_access
  - attack.t1558.003
logsource:
  category: security
  product: windows
  service: security
detection:
  selection:
    EventID: 4769
    TicketEncryptionType: '0x17'
    TicketOptions: '0x40810000'
  condition: selection
falsepositives:
