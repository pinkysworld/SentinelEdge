title: Kubernetes Privileged Container
id: container-001
status: stable
level: critical
description: Detects creation of privileged containers in Kubernetes
author: Wardex Team
date: 2025/06/01
tags:
  - attack.privilege_escalation
  - wardex.container
  - attack.t1611
logsource:
  category: container
  product: kubernetes
detection:
  selection:
    event_type: pod_create
    securityContext_privileged: 'true'
  condition: selection
falsepositives:
  - System-level DaemonSets
---
title: Container Running as Root
id: container-002
status: stable
level: high
description: Detects containers running with root user ID
author: Wardex Team
date: 2025/06/01
tags:
  - wardex.container
  - attack.t1611
logsource:
  category: container
  product: kubernetes
detection:
  selection:
    event_type: pod_create
    runAsUser: '0'
  condition: selection
falsepositives:
  - Legacy containers not yet refactored
---
title: Kubernetes Secret Access from Unauthorized Pod
id: container-003
status: stable
level: critical
description: Detects unauthorized access to Kubernetes secrets
author: Wardex Team
date: 2025/06/01
tags:
  - attack.credential_access
  - wardex.container
  - attack.t1552.007
logsource:
  category: audit
  product: kubernetes
detection:
  selection:
    verb: get
    resource: secrets
    responseStatus_code: 200
  condition: selection
falsepositives:
  - Service accounts with legitimate secret access
---
title: Container Escape via Host PID Namespace
id: container-004
status: stable
level: critical
description: Detects containers with hostPID enabled allowing process namespace escape
author: Wardex Team
date: 2025/06/01
tags:
  - attack.privilege_escalation
  - wardex.container
  - attack.t1611
logsource:
  category: container
  product: kubernetes
detection:
  selection:
    event_type: pod_create
    hostPID: 'true'
  condition: selection
