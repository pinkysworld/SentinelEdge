title: Identity - Privilege Role Assignment
id: identity-006
status: stable
level: high
description: Detects assignment of admin or privileged roles to users
author: Wardex Team
date: 2025/06/01
tags:
  - wardex.identity
  - attack.t1098
logsource:
  category: identity
  product: wardex
detection:
  selection:
    event_type: role_assign
    role|contains:
      - 'admin'
      - 'root'
      - 'superuser'
      - 'owner'
  condition: selection
falsepositives:
  - Approved role changes
---
