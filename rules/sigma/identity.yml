title: Identity - Impossible Travel Login
id: identity-001
status: stable
level: high
description: Detects user authentication from geographically distant locations in short time
author: Wardex Team
date: 2025/06/01
tags:
  - wardex.identity
  - attack.t1078
logsource:
  category: authentication
  product: wardex
detection:
  selection:
    event_type: auth_success
  condition: selection | geo_distance(src_ip) > 1000km | timeframe < 2h
falsepositives:
  - VPN usage
---
