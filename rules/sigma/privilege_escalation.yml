title: Privilege Escalation via Sudo Misconfiguration
id: privesc-001
status: stable
level: high
description: Detects exploitation of sudo NOPASSWD or wildcard misconfigurations
author: Wardex Team
date: 2025/06/01
tags:
  - attack.privilege_escalation
  - attack.t1548.003
logsource:
  category: process_creation
  product: linux
detection:
  selection:
    CommandLine|contains:
      - 'sudo -l'
      - 'sudo -i'
      - 'sudo su'
  condition: selection
falsepositives:
  - Normal sudo usage
---
title: UAC Bypass via Fodhelper
id: privesc-002
status: stable
level: critical
description: Detects UAC bypass through fodhelper.exe registry manipulation
author: Wardex Team
date: 2025/06/01
tags:
  - attack.privilege_escalation
  - attack.t1548.002
logsource:
  category: registry_event
  product: windows
detection:
  selection:
    TargetObject|contains: 'ms-settings\Shell\Open\command'
  condition: selection
falsepositives:
  - None known
---
title: SUID/SGID Binary Exploitation
id: privesc-003
status: stable
level: high
description: Detects suspicious execution of SUID/SGID binaries for privilege escalation
author: Wardex Team
date: 2025/06/01
tags:
  - attack.privilege_escalation
  - attack.t1548.001
logsource:
  category: process_creation
  product: linux
detection:
  selection:
    CommandLine|contains:
      - 'find / -perm -4000'
      - 'find / -perm -u=s'
      - 'find / -perm -2000'
  condition: selection
falsepositives:
  - Security auditing tools
---
title: Token Impersonation via Named Pipe
id: privesc-004
status: stable
level: critical
description: Detects token impersonation attacks via named pipes (Potato attacks)
author: Wardex Team
date: 2025/06/01
tags:
