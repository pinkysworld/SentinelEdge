title: Linux Capability Abuse
id: privesc-008
status: stable
level: high
description: Detects abuse of Linux capabilities for privilege escalation
author: Wardex Team
date: 2025/06/01
tags:
  - attack.privilege_escalation
  - attack.t1548.001
logsource:
  category: process_creation
  product: linux
detection:
  selection:
    CommandLine|contains:
      - 'getcap -r /'
      - 'setcap'
      - 'cap_setuid'
