title: DLL Hijacking via PATH Manipulation
id: privesc-007
status: stable
level: high
description: Detects DLL hijacking attempts via writable PATH directories
author: Wardex Team
date: 2025/06/01
tags:
  - attack.privilege_escalation
  - attack.t1574.001
logsource:
  category: file_creation
  product: windows
detection:
  selection:
    TargetFilename|endswith: '.dll'
    TargetFilename|contains:
      - '\Temp\'
      - '\Users\Public\'
  condition: selection
falsepositives:
  - Software installation
