title: Container Escape via Host Namespace
id: privesc-010
status: stable
level: critical
description: Detects container escape attempts using host namespace access
author: Wardex Team
date: 2025/06/01
tags:
  - attack.privilege_escalation
  - attack.t1611
logsource:
  category: process_creation
  product: linux
detection:
  selection:
    CommandLine|contains:
      - 'nsenter --target 1'
      - '--mount=/proc/1/ns'
      - 'chroot /host'
  condition: selection
falsepositives:
  - Container debugging
