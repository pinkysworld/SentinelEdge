title: Persistence - Web Shell Detection
id: wdx-persist-009
status: stable
level: critical
description: Detects web shell files dropped in web server directories
tags:
  - attack.persistence
  - attack.t1505.003
logsource:
  category: file_creation
  product: wardex
detection:
  selection:
    TargetFilename|endswith:
      - '.aspx'
      - '.jsp'
      - '.php'
    TargetFilename|contains:
      - '\inetpub\wwwroot'
      - '/var/www'
      - '/opt/tomcat'
  condition: selection
falsepositives:
  - Web deployments

