title: Persistence - Boot or Logon Autostart Execution
id: wdx-persist-001
status: stable
level: medium
description: >
  Detects modifications to common persistence locations including
  startup folders, Run registry keys, scheduled tasks, and services.
references:
  - https://attack.mitre.org/techniques/T1547/
  - https://attack.mitre.org/techniques/T1053/
tags:
  - attack.persistence
  - attack.t1547
  - attack.t1053
logsource:
  category: registry_event
  product: windows
detection:
  selection_run_keys:
    TargetObject|contains:
      - '\CurrentVersion\Run'
      - '\CurrentVersion\RunOnce'
      - '\CurrentVersion\RunServices'
      - '\CurrentVersion\Policies\Explorer\Run'
      - '\CurrentVersion\Explorer\Shell Folders'
      - '\CurrentVersion\Explorer\User Shell Folders'
  selection_winlogon:
    TargetObject|contains:
      - '\Microsoft\Windows NT\CurrentVersion\Winlogon'
      - '\Notify'
      - '\Userinit'
      - '\Shell'
  selection_startup_folder:
    TargetObject|contains:
      - '\Start Menu\Programs\Startup'
      - '\AppData\Roaming\Microsoft\Windows\Start Menu'
  condition: selection_run_keys or selection_winlogon or selection_startup_folder
falsepositives:
  - Legitimate software installations
  - OS updates modifying startup entries
mitre:
  tactics:
    - persistence
  techniques:
    - T1547.001  # Registry Run Keys / Startup Folder
    - T1547.004  # Winlogon Helper DLL
    - T1547.009  # Shortcut Modification

---

title: Persistence - Scheduled Task Created
id: wdx-persist-002
status: stable
level: medium
description: Detects creation of scheduled tasks which may be used for persistence.
tags:
  - attack.persistence
  - attack.t1053.005
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith:
      - '\schtasks.exe'
    CommandLine|contains:
      - '/create'
      - '/change'
  filter_system:
    User|contains:
      - 'SYSTEM'
      - 'LOCAL SERVICE'
  condition: selection and not filter_system
falsepositives:
  - Admin maintenance scripts
  - Software update schedulers
mitre:
  techniques:
    - T1053.005  # Scheduled Task

---

title: Persistence - Systemd Service Creation (Linux)
id: wdx-persist-003
status: stable
level: medium
description: Detects new systemd service unit files being created, potentially for persistence.
tags:
  - attack.persistence
  - attack.t1543.002
logsource:
  category: file_event
  product: linux
detection:
  selection:
    TargetFilename|contains:
      - '/etc/systemd/system/'
      - '/usr/lib/systemd/system/'
      - '/lib/systemd/system/'
    TargetFilename|endswith:
      - '.service'
      - '.timer'
  condition: selection
falsepositives:
  - Package installations
  - Legitimate service deployments
mitre:
  techniques:
    - T1543.002  # Systemd Service

