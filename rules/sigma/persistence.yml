title: Persistence - Boot or Logon Init Scripts
id: wdx-persist-010
status: stable
level: high
description: Detects modification of init scripts for boot persistence
tags:
  - attack.persistence
  - attack.t1037
logsource:
  category: file_event
  product: linux
detection:
  selection:
    TargetFilename|contains:
      - '/etc/rc.local'
      - '/etc/init.d/'
      - '/etc/profile.d/'
      - '.bashrc'
      - '.bash_profile'
  condition: selection
falsepositives:
  - System configuration
