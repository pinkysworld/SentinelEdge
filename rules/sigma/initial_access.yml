title: Watering Hole Attack Indicator
id: initial-006
status: stable
level: high
description: Detects rapid multi-user access to a previously benign domain that changed behavior
author: Wardex Team
date: 2025/06/01
tags:
  - attack.initial_access
  - attack.t1189
logsource:
  category: proxy
  product: wardex
detection:
  selection:
    event_type: web_access
    response_content_type|contains: 'javascript'
  condition: selection | count() by domain > 50
  timeframe: 10m
falsepositives:
  - CDN-served JavaScript
