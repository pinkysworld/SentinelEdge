title: Initial Access via Macro Execution
id: initial-001
status: stable
level: high
description: Detects Office macro execution spawning suspicious child processes
author: Wardex Team
date: 2025/06/01
tags:
  - attack.initial_access
  - attack.t1566.001
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    ParentImage|endswith:
      - '\WINWORD.EXE'
      - '\EXCEL.EXE'
      - '\POWERPNT.EXE'
    process_name|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\wscript.exe'
      - '\cscript.exe'
      - '\mshta.exe'
  condition: selection
falsepositives:
  - Macro-based business tools
---
title: ISO/IMG File Mount and Execute
id: initial-002
status: stable
level: high
description: Detects execution from mounted ISO/IMG disk images (Mark-of-the-Web bypass)
author: Wardex Team
date: 2025/06/01
tags:
  - attack.initial_access
  - attack.t1566.001
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      - '.iso'
      - '.img'
    ParentImage|endswith: '\explorer.exe'
  condition: selection
falsepositives:
  - Legitimate software distribution
---
title: HTML Smuggling Detection
id: initial-003
status: stable
level: high
description: Detects HTML files creating executable content via JavaScript
author: Wardex Team
date: 2025/06/01
tags:
  - attack.initial_access
  - attack.t1566.001
logsource:
  category: file_creation
  product: windows
detection:
  selection:
    TargetFilename|endswith:
      - '.exe'
      - '.dll'
      - '.scr'
    CreatorProcess|endswith:
      - '\msedge.exe'
      - '\chrome.exe'
      - '\firefox.exe'
  condition: selection
falsepositives:
  - Legitimate downloads
