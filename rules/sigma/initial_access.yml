title: Adversary-in-the-Middle Phishing Proxy
id: initial-010
status: stable
level: critical
description: Detects EvilGinx/Modlishka-style AitM phishing proxy indicators
author: Wardex Team
date: 2025/06/01
tags:
  - attack.initial_access
  - attack.t1557
  - attack.t1566.002
logsource:
  category: proxy
  product: wardex
detection:
  selection:
    event_type: web_access
    ssl_issuer|contains:
      - 'Let''s Encrypt'
    url|contains:
      - 'login'
      - 'microsoft'
      - 'office365'
  condition: selection
falsepositives:
  - Legitimate Microsoft login pages
