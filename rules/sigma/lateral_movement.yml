title: Internal Port Scanning
id: lateral-010
status: stable
level: medium
description: Detects port scanning activity within the internal network
author: Wardex Team
date: 2025/06/01
tags:
  - attack.lateral_movement
  - attack.t1046
logsource:
  category: network
  product: wardex
detection:
  selection:
    event_type: connection
    dst_port|count_distinct: '>50'
  condition: selection
  timeframe: 5m
falsepositives:
  - Vulnerability scanners
