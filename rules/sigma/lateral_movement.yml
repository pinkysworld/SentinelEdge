title: Lateral Movement via PsExec
id: lateral-001
status: stable
level: high
description: Detects PsExec usage for lateral movement
author: Wardex Team
date: 2025/06/01
tags:
  - attack.lateral_movement
  - attack.t1570
  - attack.t1021.002
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    process_name|endswith:
      - '\psexec.exe'
      - '\psexesvc.exe'
  condition: selection
falsepositives:
  - Legitimate admin tools
---
title: WMI Remote Execution
id: lateral-002
status: stable
level: high
description: Detects WMI-based lateral movement
author: Wardex Team
date: 2025/06/01
tags:
  - attack.lateral_movement
  - attack.t1047
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      - 'wmic /node:'
      - 'Invoke-WmiMethod'
      - 'Win32_Process Create'
  condition: selection
falsepositives:
  - SCCM management
---
title: Remote Desktop Protocol Brute Force
id: lateral-003
status: stable
level: high
description: Detects RDP brute force attempts from multiple failed logons
author: Wardex Team
date: 2025/06/01
tags:
  - attack.lateral_movement
  - attack.t1021.001
logsource:
  category: security
  product: windows
detection:
  selection:
    EventID: 4625
    LogonType: '10'
  condition: selection | count() by SourceIP > 10
  timeframe: 5m
falsepositives:
  - Misconfigured RDP clients
---
title: SSH Lateral Movement Chain
id: lateral-004
status: stable
level: medium
description: Detects SSH sessions originating from another SSH session
author: Wardex Team
date: 2025/06/01
tags:
  - attack.lateral_movement
  - attack.t1021.004
logsource:
  category: process_creation
  product: linux
detection:
  selection:
    process_name: ssh
    ParentImage|endswith: sshd
  condition: selection
falsepositives:
  - Jump hosts and bastion servers
