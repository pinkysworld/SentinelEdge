title: Defense Evasion - Linux Log Clearing
id: wdx-evasion-010
status: stable
level: high
description: Detects clearing of Linux system logs
tags:
  - attack.defense_evasion
  - attack.t1070.002
logsource:
  category: process_creation
  product: linux
detection:
  selection:
    CommandLine|contains:
      - 'truncate -s 0 /var/log'
      - '> /var/log/auth.log'
      - '> /var/log/syslog'
      - 'rm -f /var/log'
      - 'history -c'
  condition: selection
falsepositives:
  - Log rotation
