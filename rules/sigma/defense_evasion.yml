title: Defense Evasion - Indicator Removal on Host
id: wdx-evasion-001
status: stable
level: high
description: >
  Detects attempts to clear event logs, delete security artifacts,
  or remove other forensic evidence from the host.
references:
  - https://attack.mitre.org/techniques/T1070/
tags:
  - attack.defense_evasion
  - attack.t1070
logsource:
  category: process_creation
  product: windows
detection:
  selection_eventlog_clear:
    CommandLine|contains:
      - 'wevtutil cl'
      - 'wevtutil.exe cl'
      - 'Clear-EventLog'
      - 'Remove-EventLog'
  selection_shadow_delete:
    CommandLine|contains:
      - 'vssadmin delete shadows'
      - 'wmic shadowcopy delete'
      - 'bcdedit /set {default} recoveryenabled no'
      - 'bcdedit /set {default} bootstatuspolicy ignoreallfailures'
  selection_firewall_disable:
    CommandLine|contains:
      - 'netsh advfirewall set allprofiles state off'
      - 'Set-NetFirewallProfile -Enabled False'
  selection_defender_disable:
    CommandLine|contains:
      - 'Set-MpPreference -DisableRealtimeMonitoring'
      - 'sc stop WinDefend'
      - 'sc config WinDefend start= disabled'
  condition: selection_eventlog_clear or selection_shadow_delete or selection_firewall_disable or selection_defender_disable
falsepositives:
  - System maintenance scripts
  - Pre-deployment hardening procedures
mitre:
  tactics:
    - defense-evasion
  techniques:
    - T1070.001  # Clear Windows Event Logs
    - T1070.004  # File Deletion
    - T1562.001  # Disable or Modify Tools
    - T1562.004  # Disable or Modify System Firewall

---

title: Defense Evasion - Masquerading (Renamed System Binaries)
id: wdx-evasion-002
status: stable
level: medium
description: >
  Detects execution of renamed copies of system binaries, a common
  masquerading technique to bypass application whitelisting and EDR.
tags:
  - attack.defense_evasion
  - attack.t1036.003
logsource:
  category: process_creation
  product: windows
detection:
  selection_hash_mismatch:
    OriginalFileName:
      - 'cmd.exe'
      - 'powershell.exe'
      - 'rundll32.exe'
      - 'regsvr32.exe'
      - 'certutil.exe'
      - 'mshta.exe'
      - 'wscript.exe'
      - 'cscript.exe'
  filter_legit_path:
    Image|contains:
      - '\System32\'
      - '\SysWOW64\'
      - '\WindowsPowerShell\'
  condition: selection_hash_mismatch and not filter_legit_path
falsepositives:
  - Renamed copies in custom deployment directories
mitre:
  techniques:
    - T1036.003  # Rename System Utilities
    - T1036.005  # Match Legitimate Name or Location

---

title: Defense Evasion - Timestomping via touch or PowerShell
id: wdx-evasion-003
status: experimental
level: medium
description: Detects attempts to modify file timestamps to blend in with legitimate files.
tags:
  - attack.defense_evasion
  - attack.t1070.006
logsource:
  category: process_creation
detection:
  selection_powershell:
    CommandLine|contains:
      - 'CreationTime'
      - 'LastWriteTime'
      - 'LastAccessTime'
      - 'SetCreationTime'
  selection_touch:
    Image|endswith: '/touch'
    CommandLine|contains:
      - '-t '
      - '--date='
      - '-r '
  condition: selection_powershell or selection_touch
falsepositives:
  - Build systems adjusting timestamps
  - Backup restoration scripts
mitre:
  techniques:
    - T1070.006  # Timestomp

---

title: Defense Evasion - AMSI Bypass
id: wdx-evasion-004
status: stable
level: critical
description: Detects attempts to bypass AMSI (Antimalware Scan Interface)
tags:
  - attack.defense_evasion
  - attack.t1562.001
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      - 'AmsiUtils'
      - 'amsiInitFailed'
      - 'AmsiScanBuffer'
      - 'SetField.*NonPublic.*amsiContext'
  condition: selection
falsepositives:
  - Security research

---

title: Defense Evasion - Process Hollowing
id: wdx-evasion-005
status: stable
level: critical
description: Detects process hollowing techniques used to inject malicious code
tags:
  - attack.defense_evasion
  - attack.t1055.012
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    process_name|endswith:
      - '\svchost.exe'
      - '\explorer.exe'
      - '\RuntimeBroker.exe'
    ParentImage|not_endswith:
      - '\services.exe'
      - '\userinit.exe'
  condition: selection
falsepositives:
  - Custom service wrappers

---

title: Defense Evasion - ETW Tampering
id: wdx-evasion-006
status: stable
level: critical
description: Detects attempts to disable Event Tracing for Windows
tags:
  - attack.defense_evasion
  - attack.t1562.006
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      - 'logman stop'
      - 'Remove-EtwTraceSession'
      - 'Set-EtwTraceSession.*0x0'
  condition: selection
falsepositives:
  - Trace session management

---

title: Defense Evasion - DLL Side-Loading
id: wdx-evasion-007
status: stable
level: high
description: Detects DLL side-loading via legitimate signed executables
tags:
  - attack.defense_evasion
  - attack.t1574.002
logsource:
  category: image_load
  product: windows
detection:
  selection:
    ImageLoaded|endswith: '.dll'
    ImageLoaded|not_contains:
      - '\System32\'
      - '\SysWOW64\'
      - '\Program Files'
    signed: 'false'
  condition: selection
falsepositives:
  - Third-party plugins

---

title: Defense Evasion - Reflective DLL Loading
id: wdx-evasion-008
status: stable
level: critical
description: Detects reflective DLL injection via memory-only loading
tags:
  - attack.defense_evasion
  - attack.t1620
logsource:
  category: process_access
  product: windows
detection:
  selection:
    CallTrace|contains:
      - 'UNKNOWN'
      - 'clr.dll'
    GrantedAccess:
      - '0x1F0FFF'
      - '0x1FFFFF'
  condition: selection
falsepositives:
  - .NET JIT compilation

---

title: Defense Evasion - Windows Defender Exclusion
id: wdx-evasion-009
status: stable
level: high
description: Detects adding exclusions to Windows Defender
tags:
  - attack.defense_evasion
  - attack.t1562.001
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      - 'Add-MpPreference -ExclusionPath'
      - 'Add-MpPreference -ExclusionProcess'
      - 'Add-MpPreference -ExclusionExtension'
