title: Reconnaissance via Bloodhound
id: recon-001
status: stable
level: high
description: Detects Active Directory reconnaissance using Bloodhound/SharpHound
author: Wardex Team
date: 2025/06/01
tags:
  - attack.discovery
  - attack.t1087.002
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      - 'SharpHound'
      - 'BloodHound'
      - 'Invoke-BloodHound'
  condition: selection
falsepositives:
  - AD security assessments
