title: AD Domain Enumeration
id: recon-003
status: stable
level: medium
description: Detects Active Directory enumeration commands
author: Wardex Team
date: 2025/06/01
tags:
  - attack.discovery
  - attack.t1087.002
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      - 'net group "domain admins"'
      - 'Get-ADUser'
      - 'Get-ADGroupMember'
      - 'dsquery'
  condition: selection
falsepositives:
  - IT administration
